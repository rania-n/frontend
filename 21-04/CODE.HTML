<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Kantin App</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <!-- Mobile Bottom Navigation -->
    <nav class="bottom-nav">
        <a href="#" class="nav-item active">
            <i class="fas fa-home"></i>
            <span>Beranda</span>
        </a>
        <a href="#" class="nav-item">
            <i class="fas fa-shopping-cart"></i>
            <span>Keranjang</span>
        </a>
        <a href="#" class="nav-item">
            <i class="fas fa-list"></i>
            <span>Pesanan</span>
        </a>
        <a href="#" class="nav-item">
            <i class="fas fa-user"></i>
            <span>Profil</span>
        </a>
    </nav>

    <!-- Main Content -->
    <main class="main-content">
        <!-- Header Greeting -->
        <header class="header">
            <div class="greeting">
                <h1>Halo, Santri!</h1>
                <p>Apa yang ingin dimakan hari ini?</p>
            </div>
            <div class="profile-avatar">
                <i class="fas fa-user-circle"></i>
            </div>
        </header>

        <!-- Search Bar -->
        <div class="search-container">
            <i class="fas fa-search search-icon"></i>
            <input type="text" placeholder="Cari makanan favoritmu..." class="search-input">
        </div>

        <!-- Categories Section -->
        <section class="section">
            <h2>Kategori</h2>
            <div class="categories">
                <button class="category-btn active">
                    <i class="fas fa-utensils"></i>
                    <span>Makanan</span>
                </button>
                <button class="category-btn">
                    <i class="fas fa-coffee"></i>
                    <span>Minuman</span>
                </button>
                <button class="category-btn">
                    <i class="fas fa-cookie-bite"></i>
                    <span>Snack</span>
                </button>
            </div>
        </section>

        <!-- Popular Foods -->
        <section class="section">
            <h2>Makanan Populer</h2>
            <div class="food-grid">
                <article class="food-card">
                    <div class="food-image">
                        <img src="https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=300&h=200&fit=crop" alt="Nasi Goreng">
                        <div class="food-badge">⭐ 4.8</div>
                    </div>
                    <div class="food-info">
                        <h3>Nasi Goreng Spesial</h3>
                        <div class="food-price-rating">
                            <span class="price">Rp 15.000</span>
                            <button class="add-btn">
                                <i class="fas fa-plus"></i>
                            </button>
                        </div>
                    </div>
                </article>

                <article class="food-card">
                    <div class="food-image">
                        <img src="https://images.unsplash.com/photo-1512621776951-a57141f2eefd?w=300&h=200&fit=crop" alt="Ayam Goreng">
                        <div class="food-badge">⭐ 4.7</div>
                    </div>
                    <div class="food-info">
                        <h3>Ayam Goreng</h3>
                        <div class="food-price-rating">
                            <span class="price">Rp 12.000</span>
                            <button class="add-btn">
                                <i class="fas fa-plus"></i>
                            </button>
                        </div>
                    </div>
                </article>

                <article class="food-card">
                    <div class="food-image">
                        <img src="https://images.unsplash.com/photo-1541599468178-6b984ff6b5a3?w=300&h=200&fit=crop" alt="Mie Goreng">
                        <div class="food-badge">⭐ 4.9</div>
                    </div>
                    <div class="food-info">
                        <h3>Mie Goreng</h3>
                        <div class="food-price-rating">
                            <span class="price">Rp 13.000</span>
                            <button class="add-btn">
                                <i class="fas fa-plus"></i>
                            </button>
                        </div>
                    </div>
                </article>

                <article class="food-card">
                    <div class="food-image">
                        <img src="https://images.unsplash.com/photo-1567620905732-2d1ec7ab7445?w=300&h=200&fit=crop" alt="Soto Ayam">
                        <div class="food-badge">⭐ 4.6</div>
                    </div>
                    <div class="food-info">
                        <h3>Soto Ayam</h3>
                        <div class="food-price-rating">
                            <span class="price">Rp 10.000</span>
                            <button class="add-btn">
                                <i class="fas fa-plus"></i>
                            </button>
                        </div>
                    </div>
                </article>
            </div>
        </section>

        <!-- Quick Actions -->
        <section class="quick-actions">
            <div class="action-card">
                <div class="action-icon">
                    <i class="fas fa-plus-circle"></i>
                </div>
                <h3>Pesan Baru</h3>
            </div>
            <div class="action-card">
                <div class="action-icon">
                    <i class="fas fa-shopping-bag"></i>
                </div>
                <h3>Keranjang</h3>
            </div>
        </section>
    </main>
</body>
</html>
